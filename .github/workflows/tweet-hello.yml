name: tweet-hello

# Smoke test the X bot credentials. Default run only reads v2/users/me to
# prove auth works — costs nothing. Flip post_real to fire one live
# "⬢ bot online" tweet to verify the full write path end-to-end.

on:
  workflow_dispatch:
    inputs:
      post_real:
        description: 'Post a real "⬢ bot online" tweet (uses 1 of 500/mo)'
        type: boolean
        default: false

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false

      - name: Smoke test X credentials
        env:
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          POST_REAL:       ${{ inputs.post_real }}
        run: |
          if [ "$POST_REAL" = "true" ]; then
            pnpm tsx scripts/tweet-hello.ts --post
          else
            pnpm tsx scripts/tweet-hello.ts
          fi
