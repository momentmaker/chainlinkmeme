name: tweet-daily

on:
  schedule:
    # 14:00 UTC daily = 10am ET / 7am PT. Picks up the same meme the site's
    # hero shows that calendar day (both keyed on UTC date).
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the tweet text without posting'
        type: boolean
        default: false

concurrency:
  group: tweet-daily
  cancel-in-progress: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false

      - name: Ensure manifest exists
        run: pnpm manifest

      - name: Tweet
        env:
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SITE_URL:        https://chainlinkme.me
          DRY_RUN:         ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            pnpm tsx scripts/tweet-daily.ts --dry-run
          else
            pnpm tsx scripts/tweet-daily.ts
          fi
