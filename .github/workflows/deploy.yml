name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  backfill-meta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile=false

      - name: Backfill submitted_by and date_added
        env:
          CI_ACTOR: ${{ github.actor }}
        run: pnpm tsx scripts/backfill-meta.ts

      - name: Commit if changed
        run: |
          git config user.name "chainlinkmeme-bot"
          git config user.email "bot@chainlinkme.me"
          if ! git diff --quiet; then
            git add memes/
            git commit -m "ci: backfill submitted_by and date_added"
            git push
          fi

  build-and-deploy:
    needs: [backfill-meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile=false

      - name: Build manifest
        env:
          PUBLIC_REPO_REF: ${{ github.sha }}
        run: pnpm manifest

      - name: Build OG images
        run: pnpm og

      - name: Astro build
        env:
          PUBLIC_REPO_OWNER: ${{ github.repository_owner }}
          PUBLIC_REPO_NAME: ${{ github.event.repository.name }}
          PUBLIC_REPO_REF: ${{ github.sha }}
        run: pnpm --filter site build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=chainlinkmeme --branch=main

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
