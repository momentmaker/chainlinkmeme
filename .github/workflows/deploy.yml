name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  backfill-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile=false

      - name: Backfill submitted_by and date_added
        env:
          CI_ACTOR: ${{ github.actor }}
        run: pnpm tsx scripts/backfill-meta.ts

      - name: Commit if changed
        run: |
          git config user.name "chainlinkmeme-bot"
          git config user.email "bot@chainlinkme.me"
          if ! git diff --quiet; then
            git add memes/
            git commit -m "ci: backfill submitted_by and date_added"
            git push
          fi

  build-and-deploy:
    needs: [backfill-meta]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          # Deep enough to diff github.event.before..HEAD for jsDelivr
          # pre-warming of new meme files after the Pages deploy lands.
          fetch-depth: 20

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile=false

      - name: Build manifest
        env:
          PUBLIC_REPO_REF: ${{ github.sha }}
        run: pnpm manifest

      # Cache rendered OG images keyed on the memes/ content hash. Only freshly
      # added or edited memes re-render per deploy — avoids spending 20+ minutes
      # every build re-rasterizing the same 1,798 cards.
      - name: Cache OG images
        uses: actions/cache@v4
        with:
          path: site/public/og
          # Bump the version prefix whenever the OG card's visual design
          # changes. `restore-keys` happily falls back to an older cache
          # within the same version, and because the build script skips
          # existing PNGs it'll never re-render stale designs otherwise.
          key: og-v3-${{ hashFiles('memes/**/*.toml', 'scripts/build-og-images.ts', 'scripts/assets/*', 'site/src/data/weekly/*.json') }}
          restore-keys: |
            og-v3-

      - name: Build OG images
        run: pnpm og

      - name: Astro build
        env:
          PUBLIC_REPO_OWNER: ${{ github.repository_owner }}
          PUBLIC_REPO_NAME: ${{ github.event.repository.name }}
          PUBLIC_REPO_REF: ${{ github.sha }}
          SITE_URL: https://chainlinkme.me
          BASE_PATH: /
        run: pnpm --filter site build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # jsDelivr serves memes at @main, but its edge cache only pulls new
      # files from GitHub lazily (minutes to hours). During that window a
      # newly added meme resolves to 404, breaking both Telegram sendPhoto
      # and the site's OG cards. Firing a HEAD at each changed image URL
      # forces jsDelivr to pull it into cache immediately.
      - name: Pre-warm jsDelivr for changed meme files
        env:
          BEFORE_SHA: ${{ github.event.before }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE_SHA" ]; then
            echo "no 'before' SHA (initial push or dispatch); skipping pre-warm"
            exit 0
          fi
          changed=$(git diff --name-only --diff-filter=AM -z "$BEFORE_SHA" HEAD -- 'memes/*' | tr '\0' '\n' | grep -Ev '\.toml$' || true)
          if [ -z "$changed" ]; then
            echo "no meme image files changed in this push"
            exit 0
          fi
          echo "pre-warming jsDelivr for:"
          printf '  %s\n' $changed
          echo ""
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            url="https://cdn.jsdelivr.net/gh/${REPO}@main/${f}"
            status=$(curl -o /dev/null -s -w '%{http_code}' -I --max-time 15 "$url" || echo err)
            echo "  $status $url"
            case "$status" in 2??) ;; *) fail=$((fail + 1)) ;; esac
          done <<< "$changed"
          echo "pre-warm complete ($fail failures)"

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
