name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  backfill-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile=false

      - name: Backfill submitted_by and date_added
        env:
          CI_ACTOR: ${{ github.actor }}
        run: pnpm tsx scripts/backfill-meta.ts

      - name: Commit if changed
        run: |
          git config user.name "chainlinkmeme-bot"
          git config user.email "bot@chainlinkme.me"
          if ! git diff --quiet; then
            git add memes/
            git commit -m "ci: backfill submitted_by and date_added"
            git push
          fi

  build-and-deploy:
    needs: [backfill-meta]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile=false

      - name: Build manifest
        env:
          PUBLIC_REPO_REF: ${{ github.sha }}
        run: pnpm manifest

      # Cache rendered OG images keyed on the memes/ content hash. Only freshly
      # added or edited memes re-render per deploy — avoids spending 20+ minutes
      # every build re-rasterizing the same 1,798 cards.
      - name: Cache OG images
        uses: actions/cache@v4
        with:
          path: site/public/og
          key: og-v1-${{ hashFiles('memes/**/*.toml', 'scripts/build-og-images.ts', 'scripts/assets/*') }}
          restore-keys: |
            og-v1-

      - name: Build OG images
        run: pnpm og

      - name: Astro build
        env:
          PUBLIC_REPO_OWNER: ${{ github.repository_owner }}
          PUBLIC_REPO_NAME: ${{ github.event.repository.name }}
          PUBLIC_REPO_REF: ${{ github.sha }}
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm --filter site build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
