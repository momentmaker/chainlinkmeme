name: tweet-weekly

on:
  schedule:
    # Monday 14:30 UTC. weekly.yml writes the snapshot at 09:00 UTC Monday
    # and dispatches deploy.yml; by this point that deploy has usually
    # finished. The verify-and-dispatch step below is the real guarantee
    # that we never tweet a link to an unshipped page.
    - cron: '30 14 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the thread text without posting'
        type: boolean
        default: false

concurrency:
  group: tweet-weekly
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false

      - name: Ensure manifest exists
        run: pnpm manifest

      # Never tweet a link to a page that hasn't shipped. If the week's
      # page is already live we tweet immediately; otherwise dispatch
      # deploy.yml and poll until the page exists. Guards against the
      # GITHUB_TOKEN-push-doesn't-trigger-workflows footgun in weekly.yml.
      - name: Ensure target week page is deployed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(ls site/src/data/weekly/*.json 2>/dev/null | sort | tail -n 1 || true)
          if [ -z "$LATEST" ]; then
            echo "no weekly snapshot — nothing to verify"
            exit 0
          fi
          WEEK=$(basename "$LATEST" .json)
          URL="https://chainlinkme.me/week/${WEEK}/"
          check() { curl -s --max-time 15 -o /dev/null -w '%{http_code}' "$URL"; }
          CODE=$(check)
          echo "initial: $CODE $URL"
          if [ "$CODE" = "200" ]; then exit 0; fi
          echo "page missing — dispatching deploy.yml and waiting"
          gh workflow run deploy.yml --ref main
          for i in $(seq 1 30); do
            sleep 30
            CODE=$(check)
            echo "poll $i: $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
          done
          echo "timed out waiting for $URL"
          exit 1

      - name: Tweet thread
        env:
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SITE_URL:        https://chainlinkme.me
          DRY_RUN:         ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            pnpm tsx scripts/tweet-weekly.ts --dry-run
          else
            pnpm tsx scripts/tweet-weekly.ts
          fi
