name: weekly snapshot

on:
  schedule:
    # Every Monday at 09:00 UTC — freezes last week's top 7. The commit
    # that this pushes will trigger the main deploy workflow.
    - cron: '0 9 * * MON'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build manifest (for slug check)
        run: pnpm manifest
      - name: Snapshot weekly winners
        run: pnpm weekly
      - name: Commit snapshot
        run: |
          git config user.name "chainlinkmeme-bot"
          git config user.email "bot@chainlinkme.me"
          if [ -n "$(git status --porcelain site/src/data/weekly)" ]; then
            WEEK=$(date -u +%Y-W%V)
            git add site/src/data/weekly
            git commit -m "chore: weekly snapshot ${WEEK}"
            git push
          else
            echo "no new snapshot — skipping commit"
          fi
