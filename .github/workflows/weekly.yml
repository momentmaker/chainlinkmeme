name: weekly snapshot

on:
  schedule:
    # Every Monday at 09:00 UTC — freezes last week's top 7. This job also
    # explicitly dispatches deploy.yml after pushing (GITHUB_TOKEN-authored
    # pushes don't trigger push-event workflows).
    - cron: '0 9 * * MON'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build manifest (for slug check)
        run: pnpm manifest
      - name: Snapshot weekly winners
        run: pnpm weekly
      - name: Commit snapshot and trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "chainlinkmeme-bot"
          git config user.email "bot@chainlinkme.me"
          if [ -n "$(git status --porcelain site/src/data/weekly)" ]; then
            WEEK=$(date -u +%Y-W%V)
            git add site/src/data/weekly
            git commit -m "chore: weekly snapshot ${WEEK}"
            git push
            # Pushes authored by GITHUB_TOKEN don't fire push-event workflows,
            # so deploy.yml won't run on its own. Kick it explicitly — otherwise
            # /week/<key>/ never ships and tweet-weekly links to a 404.
            gh workflow run deploy.yml --ref main
          else
            echo "no new snapshot — skipping commit"
          fi
